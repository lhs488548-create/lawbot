# ---------------------------------------------------------------------------- #
# lawbot — production stack: api + caddy (auto-HTTPS).
#
#   caddy : TLS termination + reverse proxy (Let's Encrypt via DOMAIN).
#   api   : FastAPI app (api.main:app), behind caddy.
#
# Vector store is FAISS — a self-contained on-disk index, NOT a service. There is
# no qdrant or redis container: the retriever loads the prebuilt FAISS index from
# the host-built ``artifacts/의료관련/faiss`` directory (mounted read-only), and
# slowapi rate limiting uses its in-memory backend. See docs/_FAISS_BUILD_CONTRACT.md.
#
# Secrets come from a local .env file (git-ignored). Required: OPENAI_API_KEY.
# Bring up:   docker compose up -d
# Validate:   docker compose config
# ---------------------------------------------------------------------------- #

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: lawbot-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      # DOMAIN drives the Caddyfile site block + automatic Let's Encrypt cert.
      # For local testing leave it as the default `localhost` (Caddy issues a
      # local CA cert); set a real FQDN in .env for public TLS.
      DOMAIN: ${DOMAIN:-localhost}
      # Email used by Caddy for ACME account / expiry notices.
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persisted certs (do NOT lose this volume)
      - caddy_config:/config
    networks:
      - lawbot
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: lawbot-api:latest
    container_name: lawbot-api
    restart: unless-stopped
    # No host ports published: only Caddy reaches it over the internal network.
    expose:
      - "8000"
    environment:
      # --- Secrets / config (sourced from .env; never commit real values) --- #
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      COLLECTION: ${COLLECTION:-lawbot}
      # Model selection (one knob each — see config.py). EMBED_DIM is NOT set:
      # it is a code-pinned 512 invariant; a stale env value is ignored + warned.
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      GEN_MODEL: ${GEN_MODEL:-gpt-5-mini}
      # Serve the FULL Korean-law corpus with hybrid retrieval (BM25+dense) and
      # LLM colloquial→legal query rewrite. Index data is mounted at /app/artifacts.
      LAWBOT_INDEX: ${LAWBOT_INDEX:-full}
      LAWBOT_HYBRID: ${LAWBOT_HYBRID:-1}
      LAWBOT_REWRITE: ${LAWBOT_REWRITE:-1}
      # No-login public demo (per-IP rate-limited). Set 0 for key-only production.
      LAWBOT_DEMO: ${LAWBOT_DEMO:-1}
      # law.go.kr OpenAPI OC for the Citation Firewall's live 현행 check (optional;
      # empty -> firewall falls back to DB-existence only).
      LAW_OC: ${LAW_OC:-}
      # SQLite key store on a persisted volume (prod may swap to Postgres).
      API_KEYS_DB: /app/data/lawbot_keys.db
      PORT: "8000"
    volumes:
      - api_data:/app/data     # persists lawbot_keys.db across restarts
      # FAISS/BM25 index + parents.jsonl are file artifacts, not services. Mount
      # the host-built artifacts read-only; the retriever loads
      # artifacts/full_index/{index.faiss,meta.jsonl,bm25.sqlite} and the firewall
      # reads artifacts/parents.jsonl. Rebuild on the host, never in the container.
      - ./artifacts:/app/artifacts:ro
    networks:
      - lawbot
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

networks:
  lawbot:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  api_data:
